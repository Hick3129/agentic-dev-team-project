name: Validate Handoff

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'docs/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine role and directory mapping
        id: role
        run: |
          BRANCH="${GITHUB_HEAD_REF}"
          if [[ $BRANCH == pm/* ]]; then
            echo "role=product-manager" >> $GITHUB_OUTPUT
            echo "dir=requirements" >> $GITHUB_OUTPUT
          elif [[ $BRANCH == arch/* ]]; then
            echo "role=architect" >> $GITHUB_OUTPUT
            echo "dir=architecture" >> $GITHUB_OUTPUT
          elif [[ $BRANCH == eng/* ]]; then
            echo "role=engineer" >> $GITHUB_OUTPUT
            echo "dir=implementation" >> $GITHUB_OUTPUT
          elif [[ $BRANCH == review/* ]]; then
            echo "role=reviewer" >> $GITHUB_OUTPUT
            echo "dir=review" >> $GITHUB_OUTPUT
          elif [[ $BRANCH == test/* ]]; then
            echo "role=tester" >> $GITHUB_OUTPUT
            echo "dir=testing" >> $GITHUB_OUTPUT
          else
            echo "role=unknown" >> $GITHUB_OUTPUT
            echo "dir=" >> $GITHUB_OUTPUT
          fi

      - name: Check handoff.md exists and has required sections
        if: steps.role.outputs.role != 'unknown'
        run: |
          ROLE="${{ steps.role.outputs.role }}"
          DIR="docs/${{ steps.role.outputs.dir }}"
          HANDOFF_FILE="$DIR/handoff.md"
          if [ ! -f "$HANDOFF_FILE" ]; then
            echo "❌ Missing handoff.md in $DIR"
            exit 1
          fi

          REQUIRED_SECTIONS=("📦 交付內容" "✅ 已完成工作" "🔑 關鍵決策" "🧩 開放問題" "⚠️ 注意事項與風險" "📚 參考資料連結")
          for SECTION in "${REQUIRED_SECTIONS[@]}"; do
            if ! grep -q "$SECTION" "$HANDOFF_FILE"; then
              echo "❌ Missing section: '$SECTION' in handoff.md"
              exit 1
            fi
          done

          echo "✅ handoff.md validation passed for role: $ROLE"

      - name: Check required deliverables
        if: steps.role.outputs.role != 'unknown'
        run: |
          ROLE="${{ steps.role.outputs.role }}"
          DIR="docs/${{ steps.role.outputs.dir }}"
          case $ROLE in
            product-manager)
              FILES=("product-requirements.md" "user-stories.md" "acceptance-criteria.md")
              ;;
            architect)
              FILES=("technology-stack.md" "architecture.md" "database-schema.md" "api-specs.md" "directory-structure.md" "technical-risks.md")
              ;;
            engineer)
              # 檢查源碼目錄是否存在且包含程式文件
              if [ ! -d "frontend/src" ] || [ -z "$(find frontend/src -type f \( -name '*.js' -o -name '*.ts' -o -name '*.jsx' -o -name '*.tsx' \) 2>/dev/null | head -1)" ]; then
                echo "❌ No source code files found in frontend/src/"
                exit 1
              fi
              if [ ! -d "backend/src" ] || [ -z "$(find backend/src -type f \( -name '*.js' -o -name '*.ts' \) 2>/dev/null | head -1)" ]; then
                echo "❌ No source code files found in backend/src/"
                exit 1
              fi
              FILES=("README.md" "TESTING.md" "CHANGELOG.md")
              ;;
            reviewer)
              FILES=("review-report.md" "approval-status.txt")
              ;;
            tester)
              FILES=("test-cases.md" "test-execution-report.md" "sign-off.md")
              if [ ! -d "$DIR/bugs" ]; then
                echo "❌ Missing $DIR/bugs/ directory"
                exit 1
              fi
              ;;
            *)
              echo "❌ Unknown role: $ROLE"
              exit 1
              ;;
          esac

          for FILE in "${FILES[@]}"; do
            if [ ! -e "$DIR/$FILE" ]; then
              echo "❌ Missing required file: $DIR/$FILE"
              exit 1
            fi
          done

          echo "✅ All required deliverable files present for $ROLE"